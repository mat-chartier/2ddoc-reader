<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner QR Pro - A54 Optimization</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --accent: #00ff00; }
        body { font-family: sans-serif; margin: 0; background: #000; color: white; height: 100vh; overflow: hidden; }
        
        #app { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* Overlay Interface */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; 
                   display: flex; flex-direction: column; align-items: center; justify-content: center;
                   background: rgba(0,0,0,0.2); }

        /* Zone de visée */
        #scanner-box { width: 220px; height: 220px; border: 2px solid #fff; border-radius: 15px;
                       box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5); position: relative; }
        
        #scanner-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
                               background: var(--accent); box-shadow: 0 0 15px var(--accent);
                               animation: scan 2.5s ease-in-out infinite; }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        /* Contrôles de Zoom */
        #controls { position: absolute; bottom: 120px; z-index: 5; width: 80%; max-width: 300px;
                    background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px; 
                    display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex: 1; accent-color: var(--accent); }

        #info { position: absolute; top: 50px; background: rgba(0,0,0,0.7); padding: 8px 15px; 
                border-radius: 20px; font-size: 0.9em; z-index: 5; }

        /* Result Popup */
        #result-popup { position: fixed; bottom: 40px; background: white; color: #000;
                        padding: 20px; border-radius: 15px; width: 80%; display: none; z-index: 10;
                        text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #result-popup.show { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
        button { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="info">Distance conseillée : 20-30 cm</div>
    <video id="video" autoplay playsinline></video>
    
    <div id="overlay">
        <div id="scanner-box"></div>
    </div>

    <div id="controls">
        <span>🔍</span>
        <input type="range" id="zoom-range" min="1" max="1" step="0.1" value="1">
        <span id="zoom-val">1x</span>
    </div>

    <div id="result-popup">
        <div style="font-size: 0.8em; color: #666;">Contenu détecté :</div>
        <div id="result-text" style="font-weight: bold; margin: 10px 0; word-break: break-all;"></div>
        <button onclick="resetScan()">Scanner à nouveau</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas').getContext('2d', { willReadFrequently: true });
    const zoomRange = document.getElementById('zoom-range');
    const zoomVal = document.getElementById('zoom-val');
    const resultPopup = document.getElementById('result-popup');
    const resultText = document.getElementById('result-text');

    let currentTrack = null;
    let isScanning = true;

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 }, // Force le capteur principal haute résolution
                    height: { ideal: 1080 }
                }
            });
            
            video.srcObject = stream;
            currentTrack = stream.getVideoTracks()[0];

            // Attendre que la caméra réponde pour configurer le hardware
            video.onloadedmetadata = () => {
                setTimeout(setupHardware, 1000);
                requestAnimationFrame(tick);
            };
        } catch (err) {
            alert("Erreur : " + err.message + "\nVérifiez que vous êtes en HTTPS.");
        }
    }

    async function setupHardware() {
        if (!currentTrack) return;
        const caps = currentTrack.getCapabilities();
        
        const constraints = { advanced: [] };

        // 1. Force Autofocus Continu
        if (caps.focusMode?.includes('continuous')) {
            constraints.advanced.push({ focusMode: 'continuous' });
        }

        // 2. Setup du Zoom
        if (caps.zoom) {
            zoomRange.min = caps.zoom.min;
            zoomRange.max = caps.zoom.max;
            
            // On pré-zoome à 2.5x par défaut (idéal pour QR 3cm sur A54)
            const defaultZoom = Math.min(2.5, caps.zoom.max);
            zoomRange.value = defaultZoom;
            zoomVal.innerText = defaultZoom + "x";
            constraints.advanced.push({ zoom: defaultZoom });
        }

        try {
            await currentTrack.applyConstraints(constraints);
        } catch (e) { console.error("Hardware setup failed", e); }
    }

    // Mise à jour manuelle du zoom via le curseur
    zoomRange.oninput = async (e) => {
        const val = parseFloat(e.target.value);
        zoomVal.innerText = val.toFixed(1) + "x";
        if (currentTrack) {
            await currentTrack.applyConstraints({ advanced: [{ zoom: val }] });
        }
    };

    function tick() {
        if (isScanning && video.readyState === video.HAVE_ENOUGH_DATA) {
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            canvas.canvas.width = vW;
            canvas.canvas.height = vH;
            
            // On dessine la frame
            canvas.drawImage(video, 0, 0, vW, vH);
            
            const imageData = canvas.getImageData(0, 0, vW, vH);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code && code.data !== "") {
                onDetected(code.data);
            }
        }
        if (isScanning) requestAnimationFrame(tick);
    }

    function onDetected(data) {
        isScanning = false;
        if (navigator.vibrate) navigator.vibrate(150);
        
        resultText.innerText = data;
        resultPopup.classList.add('show');
    }

    function resetScan() {
        resultPopup.classList.remove('show');
        isScanning = true;
        requestAnimationFrame(tick);
    }

    window.onload = initCamera;
</script>
</body>
</html>
