<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Radical - Samsung A54 Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #app { position: relative; width: 100%; height: 100%; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        /* Overlay UI */
        #overlay { position: absolute; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #scanner-box { width: 250px; height: 250px; border: 3px solid #fff; border-radius: 20px; box-shadow: 0 0 0 100vmax rgba(0,0,0,0.7); position: relative; }
        #scanner-box::after { content: "MISE AU POINT..."; position: absolute; top: -30px; width: 100%; text-align: center; color: #0f0; font-size: 12px; font-weight: bold; }
        
        #status { position: absolute; top: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; color: #0f0; font-size: 14px; }
        
        #result-popup { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 20px; border-radius: 15px; width: 80%; display: none; z-index: 100; text-align: center; }
        button { background: #222; color: white; border: none; padding: 12px 25px; border-radius: 8px; margin-top: 15px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="status">Recherche du flux optimal...</div>
    <video id="video" autoplay playsinline></video>
    <div id="overlay">
        <div id="scanner-box"></div>
    </div>
    
    <div id="result-popup">
        <div id="result-text" style="word-break: break-all; margin-bottom: 10px;"></div>
        <button onclick="restartScan()">RESCANNER</button>
    </div>
</div>

<canvas id="offscreenCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const resultPopup = document.getElementById('result-popup');
    const resultText = document.getElementById('result-text');
    const canvas = document.getElementById('offscreenCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let imageCapture = null;
    let scanInterval = null;
    let isScanning = true;

    async function startRadicalScanner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });

            video.srcObject = stream;
            const track = stream.getVideoTracks()[0];
            
            // On attend que la vidéo soit prête
            video.onloadedmetadata = async () => {
                status.innerText = "Matériel détecté : Activation Focus...";
                
                // On crée l'objet ImageCapture lié à la piste vidéo
                imageCapture = new ImageCapture(track);
                
                // Tentative de configuration hardware forcée
                await applyHardwareFix(track);
                
                // Lancement du cycle de capture haute résolution
                startCaptureLoop();
            };

        } catch (err) {
            status.innerText = "Erreur : " + err.name;
            console.error(err);
        }
    }

    async function applyHardwareFix(track) {
        const caps = track.getCapabilities();
        const constraints = { advanced: [] };

        // Force l'autofocus continu s'il est dispo
        if (caps.focusMode?.includes('continuous')) {
            constraints.advanced.push({ focusMode: 'continuous' });
        }
        
        // Force un zoom léger (x2.0) pour aider la netteté de loin
        if (caps.zoom) {
            constraints.advanced.push({ zoom: Math.min(2.0, caps.zoom.max) });
        }

        try {
            await track.applyConstraints(constraints);
        } catch (e) { console.warn("Contraintes ignorées"); }
    }

    function startCaptureLoop() {
        // Au lieu de lire le flux video flou, on capture une "frame" nette
        // toutes les 500ms (assez rapide pour être fluide, assez lent pour laisser le focus bosser)
        scanInterval = setInterval(async () => {
            if (!isScanning) return;

            try {
                // grabFrame() récupère une ImageBitmap de meilleure qualité que le stream video
                const bitmap = await imageCapture.grabFrame();
                
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                ctx.drawImage(bitmap, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code && code.data) {
                    onSuccess(code.data);
                }
                
                // Libération mémoire
                bitmap.close();
                
            } catch (e) {
                // Si grabFrame échoue (en cours de focus), on fallback sur la vidéo classique
                analyzeVideoFallback();
            }
        }, 500);
    }

    function analyzeVideoFallback() {
        if (!isScanning) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) onSuccess(code.data);
    }

    function onSuccess(data) {
        isScanning = false;
        clearInterval(scanInterval);
        if (navigator.vibrate) navigator.vibrate(200);
        
        resultText.innerText = data;
        resultPopup.style.display = 'block';
        status.innerText = "QR Code trouvé !";
    }

    function restartScan() {
        resultPopup.style.display = 'none';
        isScanning = true;
        status.innerText = "Scan en cours...";
        startCaptureLoop();
    }

    window.onload = startRadicalScanner;
</script>

</body>
</html>
