<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sélecteur Caméra - Samsung Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
        
        /* En-tête : Choix de la caméra */
        #header { pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; text-align: center; }
        select { background: #333; color: white; padding: 10px; border-radius: 5px; width: 80%; }

        /* Milieu : Zone de visée */
        #scanner-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        #box { width: 250px; height: 250px; border: 2px solid #0f0; border-radius: 20px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }

        /* Pied : Infos */
        #footer { pointer-events: auto; background: rgba(0,0,0,0.7); padding: 20px; text-align: center; }
        #log { font-size: 11px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <video id="video" autoplay playsinline></video>
    
    <div id="ui-layer">
        <div id="header">
            <label>Changer de capteur :</label><br><br>
            <select id="camera-select">
                <option value="">Chargement des caméras...</option>
            </select>
        </div>

        <div id="scanner-container">
            <div id="box"></div>
        </div>

        <div id="footer">
            <div id="status">Prêt au scan</div>
            <div id="log">Initialisation...</div>
        </div>
    </div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const cameraSelect = document.getElementById('camera-select');
    const log = document.getElementById('log');
    const canvas = document.getElementById('c').getContext('2d');
    
    let currentStream = null;

    // 1. Lister toutes les caméras
    async function getCameras() {
        try {
            // On demande d'abord une permission générique pour débloquer les labels
            const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            tempStream.getTracks().forEach(t => t.stop());

            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';

            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                // Sur Samsung, cherche "Main" ou "Camera 0". 
                // "Camera 2" ou "Wide" est souvent celle qui n'a pas d'AF.
                option.text = device.label || `Caméra ${index + 1}`;
                cameraSelect.appendChild(option);
            });

            // Sélectionner la dernière par défaut (souvent la principale sur Android)
            if (videoDevices.length > 0) {
                cameraSelect.value = videoDevices[videoDevices.length - 1].deviceId;
                startStream(videoDevices[videoDevices.length - 1].deviceId);
            }

        } catch (e) {
            log.innerText = "Erreur listing: " + e.message;
        }
    }

    // 2. Démarrer un flux spécifique
    async function startStream(deviceId) {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }

        log.innerText = "Connexion au capteur...";

        const constraints = {
            video: {
                deviceId: { exact: deviceId },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            
            const track = currentStream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            
            log.innerText = `Focus: ${caps.focusMode ? caps.focusMode.join(',') : 'Non supporté'}`;

            // On tente d'activer l'AF
            if (caps.focusMode && caps.focusMode.includes('continuous')) {
                await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
            }

        } catch (e) {
            log.innerText = "Erreur démarrage: " + e.message;
        }
    }

    // 3. Boucle de scan
    function scan() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.canvas.width = video.videoWidth;
            canvas.canvas.height = video.videoHeight;
            canvas.drawImage(video, 0, 0);
            const imgData = canvas.getImageData(0, 0, canvas.canvas.width, canvas.canvas.height);
            const code = jsQR(imgData.data, imgData.width, imgData.height);
            
            if (code) {
                document.getElementById('status').innerText = "CODE: " + code.data;
                document.getElementById('status').style.color = "#0f0";
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }
        requestAnimationFrame(scan);
    }

    cameraSelect.onchange = () => startStream(cameraSelect.value);

    getCameras();
    requestAnimationFrame(scan);
</script>
</body>
</html>
